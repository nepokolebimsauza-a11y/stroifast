# Статика в ветку gh-pages. Settings → Pages: Deploy from branch → gh-pages / (root).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          touch _site/.nojekyll
      - name: Push to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          folder: _site
          branch: gh-pages
