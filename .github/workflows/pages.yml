# Статика в ветку gh-pages. В Settings → Pages выберите: Deploy from branch → gh-pages / (root).
# Так не нужен режим «GitHub Actions» в настройках Pages (из‑за него часто падает configure-pages).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          touch _site/.nojekyll
      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
